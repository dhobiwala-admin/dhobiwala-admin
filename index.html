<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Shuchi Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f1ea;color:#1a1108;max-width:1200px;margin:0 auto;min-height:100vh;padding:20px}
:root{--ink:#1a1108;--gold:#e8a020;--green:#16a34a;--red:#dc2626;--border:#e5ddd0}

/* AUTH */
#pgAuth{display:none;min-height:100vh;align-items:center;justify-content:center}
#pgAuth.show{display:flex}
.auth-box{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.1)}
.auth-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:#1a1108;margin-bottom:4px}
.auth-logo span{color:#e8a020}
.auth-role{font-size:0.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
.finput{width:100%;padding:13px 16px;border:1.5px solid #ddd6c8;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.92rem;color:#1a1108;background:#fff;outline:none;transition:border-color 0.2s}
.finput:focus{border-color:#e8a020}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:48px}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#aaa}
.err-msg{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:0.82rem;color:#dc2626;margin-bottom:14px;display:none}
.login-btn{width:100%;padding:15px;background:#1a1108;color:#fff;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;cursor:pointer;margin-top:4px}
.login-btn:disabled{opacity:0.6}

/* DASHBOARD */
#pgDash{display:none}
#pgDash.show{display:block}
.dash-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e5ddd0}
.dash-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:#1a1108}
.dash-brand span{color:#e8a020}
.dash-sub{font-size:0.78rem;color:#888;margin-top:2px}
.logout-btn{padding:9px 18px;background:#f5f1ea;border:1px solid #e5ddd0;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;color:#888}

/* PENDING BANNER */
.pend-banner{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:16px;padding:14px 18px;margin-bottom:20px;display:none;justify-content:space-between;align-items:center;gap:12px}
.pend-banner.show{display:flex}
.pend-text{font-size:0.85rem}
.pend-text strong{display:block;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:2px}
.pend-text span{opacity:0.75;font-size:0.78rem}
.pend-review-btn{padding:8px 16px;background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.78rem;white-space:nowrap}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;overflow-x:auto}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr}}
.stat-box{background:#fff;border-radius:16px;padding:16px;border:1px solid #e5ddd0}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#1a1108}
.stat-lbl{font-size:0.72rem;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
.stat-badge{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;vertical-align:middle}

/* NAV TABS */
.nav-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tab{padding:9px 16px;border:1.5px solid #e5ddd0;border-radius:20px;white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;background:#fff;color:#888;transition:all 0.15s;position:relative}
.nav-tab.on{background:#1a1108;color:#fff;border-color:#1a1108}
.tab-badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;border-radius:999px;font-size:0.6rem;padding:2px 6px;font-weight:800;display:none}
.tab-badge.show{display:block}

/* ACTION BTNS */
.btn-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.btn{padding:9px 18px;border-radius:12px;white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;border:none;transition:all 0.15s}
.btn:active{transform:scale(0.96)}
.btn-dark{background:#1a1108;color:#fff}
.btn-outline{background:#fff;color:#1a1108;border:1.5px solid #e5ddd0}
.btn-gold{background:linear-gradient(135deg,#e8a020,#c97c10);color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-red{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.btn-sm{padding:6px 12px;font-size:0.75rem}

/* RESULTS */
.results{display:flex;flex-direction:column;gap:10px}
.rcard{background:#fff;border-radius:16px;padding:16px;border:1px solid #e5ddd0}
.rcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rcard-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem}
.rcard-meta{font-size:0.75rem;color:#888;margin-top:2px}
.rcard-btns{display:flex;gap:8px;margin-top:10px}
.status-badge{padding:4px 12px;border-radius:20px;font-size:0.67rem;font-weight:700}
.sb-pend{background:#fef9ec;color:#b45309}.sb-ok{background:#f0fdf4;color:#166534}.sb-bad{background:#fee2e2;color:#dc2626}.sb-blue{background:#eff6ff;color:#1d4ed8}
.analytics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
@media(max-width:700px){.analytics-grid{grid-template-columns:1fr 1fr}}
.an-box{background:#f5f1ea;border-radius:12px;padding:12px;border:1px solid #e5ddd0}
.an-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:#1a1108}
.an-lbl{font-size:0.65rem;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
.empty{text-align:center;padding:30px;color:#888;background:#fff;border-radius:14px;border:1px solid #e5ddd0}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1108;color:#fff;padding:12px 24px;border-radius:30px;font-size:0.82rem;font-weight:600;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .nav-tabs{gap:4px}
  .nav-tab{padding:7px 10px;font-size:0.75rem}
  .dash-hdr{flex-direction:column;align-items:flex-start;gap:8px}
  body{padding:12px}
}
.dash-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5ddd0;flex-wrap:wrap;gap:10px}

/* ── ORDER FLOW TIMELINE ── */
.flow-wrap{margin:12px 0}
.flow-step{display:flex;gap:12px;padding-bottom:16px;position:relative}
.flow-step:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;bottom:0;width:2px;background:#e5ddd0}
.flow-step.done:not(:last-child)::before{background:#16a34a}
.flow-step.active:not(:last-child)::before{background:#e8a020}
.fs-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;flex-shrink:0;border:2px solid transparent}
.fs-done{background:#16a34a;color:#fff;border-color:#16a34a}
.fs-active{background:#e8a020;color:#fff;border-color:#e8a020}
.fs-wait{background:#fff;color:#aaa;border-color:#e5ddd0}
.fs-skip{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.fs-body{flex:1;padding-top:4px}
.fs-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:#1a1108}
.fs-sub{font-size:0.72rem;color:#888;margin-top:2px}
.fs-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.62rem;font-weight:700;margin-top:4px}
.tag-ok{background:#f0fdf4;color:#166534}
.tag-warn{background:#fef9ec;color:#b45309}
.tag-err{background:#fee2e2;color:#dc2626}
.tag-blue{background:#eff6ff;color:#1d4ed8}
.otp-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.65rem;font-weight:700;margin-right:4px;margin-top:4px}
.otp-used{background:#f0fdf4;color:#166534}
.otp-pending{background:#f5f1ea;color:#888}
.detail-section{background:#fff;border-radius:14px;padding:14px;border:1px solid #e5ddd0;margin-bottom:10px}
.detail-section h4{font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
</style>
</head>
<body>
<div id="toastEl" class="toast"></div>

<!-- AUTH -->
<div id="pgAuth" class="show">
  <div class="auth-box">
    <div class="auth-logo">Shu<span>chi</span></div>
    <div class="auth-role">Admin Panel</div>
    <div id="authErr" class="err-msg"></div>
    <div class="field"><label>Admin Email</label>
      <input class="finput" type="email" id="aEmail" placeholder="admin@shuchi.in" onkeydown="if(event.key==='Enter')document.getElementById('aPass').focus()"/>
    </div>
    <div class="field"><label>Password</label>
      <div class="pass-wrap">
        <input class="finput" type="password" id="aPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="eye-btn" type="button" onclick="toggleEye('aPass',this)">👁</button>
      </div>
    </div>
    <button class="login-btn" id="btnLogin" onclick="doLogin()">Access Admin Panel →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="pgDash">
  <div class="dash-hdr">
    <div>
      <div class="dash-brand">Shu<span>chi</span> Admin</div>
      <div class="dash-sub">Operations Dashboard</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>

  <!-- PENDING BANNER -->
  <div class="pend-banner" id="pendingBanner">
    <div class="pend-text"><strong>⚠️ Pending Approvals</strong><span id="pendingText">Loading...</span></div>
    <button class="pend-review-btn" onclick="loadRiders()">Review Now</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-box"><div class="stat-val" id="statOrders">—</div><div class="stat-lbl">Active Orders</div></div>
    <div class="stat-box"><div class="stat-val" id="statRiders">—</div><div class="stat-lbl">Riders On Duty</div></div>
    <div class="stat-box"><div class="stat-val" id="statShops">—</div><div class="stat-lbl">Shops Open</div></div>
    <div class="stat-box"><div class="stat-val" id="statPending">—</div><div class="stat-lbl">Pending Approvals</div></div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab on" onclick="setTab('orders',this)">📦 Orders</button>
    <button class="nav-tab" onclick="setTab('riders',this)">🏍 Riders <span class="tab-badge" id="riderBadge">0</span></button>
    <button class="nav-tab" onclick="setTab('vendors',this)">🏪 Vendors <span class="tab-badge" id="vendorBadge">0</span></button>
    <button class="nav-tab" onclick="setTab('customers',this)">👤 Customers</button>
    <button class="nav-tab" onclick="setTab('analytics',this)">📊 Analytics</button>
    <button class="nav-tab" onclick="setTab('slots',this)">🗓 Upcoming Slots</button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="btn-row" id="actionRow">
    <button class="btn btn-dark" onclick="loadOrders()">🔄 Refresh</button>
    <button class="btn btn-outline" onclick="loadStuck()">⚠️ Stuck Orders</button>
    <button class="btn btn-outline" onclick="loadDispatch()">🚀 Dispatch Queue</button>
    <button class="btn btn-outline" onclick="loadSLA()">🚨 SLA Breaches</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results"><div class="empty">Loading orders...</div></div>
</div>

<script>
var API       = 'https://dhobiwala-backend.onrender.com';
var adminToken= '';
var curTab    = 'orders';
var allRiders = [];
var allVendors= [];

// STORAGE
function getToken(){ return adminToken||localStorage.getItem('sc_admin_token')||''; }
function saveToken(t){ adminToken=t; localStorage.setItem('sc_admin_token',t); }
function clearAuth(){ adminToken=''; localStorage.removeItem('sc_admin_token'); }
function authHdr(){ return { 'Authorization':'Bearer '+getToken(), 'Content-Type':'application/json' }; }

// TOAST
function toast(msg){ var el=document.getElementById('toastEl'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},3000); }

// AUTH
function toggleEye(id,btn){ var f=document.getElementById(id); if(!f)return; f.type=f.type==='password'?'text':'password'; btn.textContent=f.type==='password'?'👁':'🙈'; }
function showErr(msg){ var e=document.getElementById('authErr'); e.textContent=msg; e.style.display='block'; }

function doLogin(){
  var email=(document.getElementById('aEmail').value||'').trim();
  var pw=(document.getElementById('aPass').value||'').trim();
  if(!email||!pw){showErr('Enter email and password');return;}
  var btn=document.getElementById('btnLogin'); btn.disabled=true; btn.textContent='Logging in…';
  fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pw})})
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false; btn.textContent='Access Admin Panel →';
    if(!d.success){showErr(d.message||'Login failed');return;}
    saveToken(d.token);
    bootDash();
  }).catch(function(){btn.disabled=false;btn.textContent='Access Admin Panel →';showErr('Network error');});
}


// ── UPCOMING NORMAL DELIVERY SLOTS ───────────────────────────────────────────
function loadSlots(){
  showResults('<div class="empty">Loading slots...</div>');
  fetch(API+'/api/admin/orders',{headers:authHdr()})
  .then(function(r){return r.json();})
  .then(function(d){
    var orders=(d.orders||[]).filter(function(o){
      return o.deliveryType==='normal' && ['placed','accepted','vendor_accepted','pickup_scheduled'].includes(o.status);
    });
    if(!orders.length){showResults('<div class="empty">✅ No pending normal delivery slots</div>');return;}

    // Group by slot
    var morning=[], evening=[], unset=[];
    orders.forEach(function(o){
      if(o.normalSlot==='morning') morning.push(o);
      else if(o.normalSlot==='evening') evening.push(o);
      else unset.push(o);
    });

    var now=new Date();
    var hour=now.getHours();
    var nextSlot=hour<10?'Morning (7-10 AM)':hour<17?'Evening (5-7 PM)':'Morning Tomorrow (7-10 AM)';

    var html='<div class="rcard" style="margin-bottom:12px">'
      +'<div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:4px">📍 Current Time: '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</div>'
      +'<div style="font-size:0.8rem;color:#888">Next pickup slot: <strong style="color:#1a1108">'+nextSlot+'</strong></div>'
      +'</div>';

    function renderSlotGroup(title, icon, orders, urgent){
      if(!orders.length) return '<div class="rcard" style="border:1px solid #e5ddd0;margin-bottom:10px"><div style="font-weight:700;font-size:0.85rem;margin-bottom:4px">'+icon+' '+title+'</div><div style="font-size:0.78rem;color:#888">No orders for this slot</div></div>';
      var s='<div class="rcard" style="border-left:4px solid '+(urgent?'#dc2626':'#e8a020')+';margin-bottom:10px">'
        +'<div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.88rem;margin-bottom:10px">'+icon+' '+title+' — '+orders.length+' order'+(orders.length>1?'s':'')+' '+(urgent?'<span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:20px;font-size:0.65rem">UPCOMING NOW</span>':'')+'</div>';
      orders.forEach(function(o){
        var cust=o.customer&&o.customer.name?o.customer.name:'Customer';
        var area=o.pickupAddress&&o.pickupAddress.area?o.pickupAddress.area:'';
        var pickupTrip=(o.trips||[]).find(function(t){return t.type==='pickup';});
        var riderAssigned=pickupTrip&&pickupTrip.riderId;
        var confirmed=pickupTrip&&pickupTrip.riderConfirmed;
        var confirming=pickupTrip&&pickupTrip.status==='confirming'&&!pickupTrip.riderConfirmed;
        var deadline=pickupTrip&&pickupTrip.confirmationDeadline?new Date(pickupTrip.confirmationDeadline):null;
        var minsLeft=deadline?Math.max(0,Math.round((deadline-Date.now())/60000)):null;

        var statusColor=confirmed?'background:#f0fdf4;color:#166534':confirming?'background:#fef9ec;color:#b45309':riderAssigned?'background:#eff6ff;color:#1d4ed8':'background:#fee2e2;color:#dc2626';
        var statusTxt=confirmed?'✓ Rider confirmed':confirming?'⏰ Awaiting confirm'+(minsLeft!==null?' ('+minsLeft+'m left)':''):riderAssigned?'👤 Rider assigned':'⚠️ No rider yet';

        s+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f1ea">'
          +'<div><div style="font-weight:600;font-size:0.82rem">#'+(o.orderNumber||o._id.slice(-6))+' · '+cust+'</div>'
          +'<div style="font-size:0.72rem;color:#888">'+area+' · ₹'+(o.totalAmount||0)+' · '+o.status+'</div></div>'
          +'<div style="text-align:right">'
          +'<div style="font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;'+statusColor+'">'+statusTxt+'</div>'
          +(confirming?'<button onclick="forceReassign(''+o._id+'')" style="margin-top:4px;background:#dc2626;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:0.62rem;font-weight:700;cursor:pointer">Force Reassign</button>':'')
          +'</div></div>';
      });
      s+='</div>';
      return s;
    }

    var isMorningNext=hour<10;
    var isEveningNext=hour>=10&&hour<17;
    html+=renderSlotGroup('Morning Slot (7-10 AM)','☀️',morning,isMorningNext);
    html+=renderSlotGroup('Evening Slot (5-7 PM)','🌙',evening,isEveningNext);
    if(unset.length) html+=renderSlotGroup('Slot Not Set','❓',unset,false);

    showResults(html);
  }).catch(function(){showResults('<div class="empty">Error loading slots</div>');});
}


function forceReassign(orderId){
  if(!confirm('Force reassign this order to a new rider?')) return;
  // Update order status via admin endpoint
  fetch(API+'/api/admin/orders/'+orderId,{headers:authHdr()})
  .then(function(r){return r.json();})
  .then(function(d){
    toast('Reassignment triggered - check back in 1 minute');
    setTimeout(loadSlots, 5000);
  }).catch(function(){toast('Error');});
}

function doLogout(){ clearAuth(); document.getElementById('pgAuth').classList.add('show'); document.getElementById('pgDash').classList.remove('show'); document.getElementById('authErr').style.display='none'; }

// BOOT DASHBOARD
function bootDash(){
  document.getElementById('pgAuth').classList.remove('show');
  document.getElementById('pgDash').classList.add('show');
  loadLive();
  loadOrders();
  loadRiders();
  loadVendors();
}

// LIVE STATS
function loadLive(){
  fetch(API+'/api/admin/live',{headers:authHdr()})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.success)return;
    document.getElementById('statOrders').textContent=d.activeOrders||0;
    document.getElementById('statRiders').textContent=d.onDutyRiders||0;
    document.getElementById('statShops').textContent=d.openShops||0;
  }).catch(function(){});
}

// NAVIGATION
function setTab(tab, btn){
  curTab=tab;
  document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var ar=document.getElementById('actionRow');
  if(tab==='orders'){
    ar.innerHTML='<button class="btn btn-dark" onclick="loadOrders()">🔄 All Orders</button>'
      +'<button class="btn btn-outline" onclick="loadStuck()">⚠️ Stuck</button>'
      +'<button class="btn btn-outline" onclick="loadDispatch()">🚀 Dispatch Queue</button>'
      +'<button class="btn btn-outline" onclick="loadSLA()">🚨 SLA Breaches</button>'
      +'<button class="btn btn-outline" onclick="loadUpcomingSlots()">📅 Upcoming Slots</button>';
    loadOrders();
  } else if(tab==='riders'){
    ar.innerHTML='<button class="btn btn-dark" onclick="loadRiders()">🔄 All Riders</button>'
      +'<button class="btn btn-outline" onclick="loadRidersPending()">⏳ Pending</button>';
    loadRiders();
  } else if(tab==='vendors'){
    ar.innerHTML='<button class="btn btn-dark" onclick="loadVendors()">🔄 All Vendors</button>'
      +'<button class="btn btn-outline" onclick="loadVendorsPending()">⏳ Pending</button>';
    loadVendors();
  } else if(tab==='customers'){
    ar.innerHTML='<button class="btn btn-dark" onclick="loadCustomers()">🔄 Customers</button>';
    loadCustomers();
  } else if(tab==='slots'){
    ar.innerHTML='<button class="btn btn-dark" onclick="loadSlots()">🔄 Refresh</button>';
    loadSlots();
  } else if(tab==='analytics'){

      +'<div>'+(o.shop&&o.shop.name?o.shop.name:'—')+'</div>'

      +'</div>'
      +'<div style="margin-top:10px;font-size:0.78rem"><span style="color:#888">📍 Pickup: </span>'
      +(o.pickupAddress?[o.pickupAddress.area,o.pickupAddress.zone].filter(Boolean).join(' · '):'—')+'</div>'
      +'<div style="font-size:0.78rem;margin-top:4px"><span style="color:#888">💰 Total: </span>₹'+(o.totalAmount||0)
      +' · <span style="color:#888">Wallet: </span>₹'+(o.walletAmountUsed||0)
      +' · <span style="color:#888">Cashback: </span>₹'+(o.cashbackEarned||0)+'</div>'
      +'</div>';

    // ── ITEMS ───────────────────────────────────────────────────────────
    html+='<div class="detail-section"><h4>Items ('+( o.items||[]).length+')</h4>'
      +(o.items||[]).map(function(it){

          +'<span class="fs-tag '+statusCls+'">'+it.itemStatus+'</span></div>';

    // ── OTP STATUS ──────────────────────────────────────────────────────
    if(o.otps){
      html+='<div class="detail-section"><h4>OTP Chain</h4>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px">';
      var otpTypes=[
        {key:'pickupOtp',  lbl:'Pickup (Cust→Rider)'},
        {key:'dropOtp',    lbl:'Drop (Rider→Vendor)'},
        {key:'collectOtp', lbl:'Collect (Vendor→Rider)'},
        {key:'deliveryOtp',lbl:'Delivery (Rider→Cust)'}

      otpTypes.forEach(function(ot){
        var otp=o.otps[ot.key];

      });

    // ── RIDERS ─────────────────────────────────────────────────────────

    var pickupTrip=trips.find(function(t){return t.type==='pickup';});
    var delivTrips=trips.filter(function(t){return t.type==='delivery';});
    if(trips.length){
      html+='<div class="detail-section"><h4>Rider Assignment</h4>';
      trips.forEach(function(t){
        var statusCls=t.status==='completed'?'tag-ok':t.status==='in_progress'||t.status==='confirmed'?'tag-blue':t.status==='confirming'?'tag-warn':t.riderId?'tag-blue':'tag-err';
        var riderInfo=t.riderId?(typeof t.riderId==='object'?(t.riderId.name||'Assigned'):'Assigned'):'Not assigned';
        var confirmed=t.riderConfirmed?'<span class="fs-tag tag-ok" style="margin-left:4px">✓ Confirmed</span>':'';
        var confirming=t.status==='confirming'&&!t.riderConfirmed?'<span class="fs-tag tag-warn" style="margin-left:4px">⏰ Awaiting confirm</span>':'';
        var deadline=t.confirmationDeadline?new Date(t.confirmationDeadline):null;
        var minsLeft=deadline?Math.max(0,Math.round((deadline-Date.now())/60000)):null;
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f1ea">'
          +'<div style="font-size:0.8rem"><div style="font-weight:600">'+(t.type==='pickup'?'🏍 Pickup Trip':'📦 Delivery Trip')+'</div>'
          +'<div style="color:#888;margin-top:1px">'+riderInfo+(t.type==='delivery'&&isNormal&&o.normalSlot?' · '+(o.normalSlot==='morning'?'☀️ Morning':'🌙 Evening')+' slot':'')+'</div>'
          +(confirming&&minsLeft!==null?'<div style="color:#dc2626;font-size:0.68rem;margin-top:2px">'+minsLeft+' min to confirm</div>':'')
          +'</div>'
          +'<div style="text-align:right"><span class="fs-tag '+statusCls+'">'+t.status+'</span>'+(t.riderConfirmed?confirmed:'')+(t.status==='confirming'&&!t.riderConfirmed?confirming:'')+'</div></div>';
      });
      html+='</div>';
    }

    // ── FULL ORDER FLOW TIMELINE ────────────────────────────────────────
    var FLOW_STEPS = isQuick ? [
      {status:'placed',          icon:'📋', title:'Order Placed',          sub:'Customer placed order'},
      {status:'accepted',        icon:'✅', title:'Vendor Accepted',        sub:'Shop accepted order'},
      {status:'picked_up',       icon:'🏍', title:'Rider Picked Up',        sub:'Items collected from customer'},
      {status:'at_shop',         icon:'🏪', title:'Arrived at Shop',         sub:'Rider dropped items at vendor'},
      {status:'processing',      icon:'⚙️',  title:'Processing',             sub:'Vendor washing/ironing items'},
      {status:'out_for_delivery',icon:'🛵', title:'Out for Delivery',       sub:'Rider heading to customer'},
      {status:'delivered',       icon:'🎉', title:'Delivered',              sub:'Customer received items'}
    ] : [
      {status:'placed',                  icon:'📋', title:'Order Placed',             sub:'Customer placed order'},
      {status:'accepted',                icon:'✅', title:'Vendor Accepted',           sub:'Shop accepted the order'},
      {status:'picked_up',               icon:'🏍', title:'Pickup Trip',               sub:'Items collected from customer · '+(o.normalSlot==='morning'?'☀️ Morning slot':'🌙 Evening slot')},
      {status:'at_shop',                 icon:'🏪', title:'Arrived at Shop',           sub:'Items dropped at vendor shop'},
      {status:'processing',              icon:'⚙️',  title:'Processing at Shop',        sub:'Vendor preparing items'},
      {status:'ready',                   icon:'📦', title:'Items Ready',               sub:'Ready for delivery pickup'},
      {status:'out_for_delivery',        icon:'🛵', title:'Delivery Trip',             sub:'Items being delivered · '+(o.normalSlot==='morning'?'☀️ Morning slot':'🌙 Evening slot')},
      {status:'delivered',               icon:'🎉', title:'Delivered',                sub:'Customer received items'}
    ];

    var allStatuses=(o.statusHistory||[]).map(function(s){return s.status;});
    var currentIdx=FLOW_STEPS.findIndex(function(s){return s.status===o.status;});

    html+='<div class="detail-section"><h4>Order Flow</h4><div class="flow-wrap">';
    FLOW_STEPS.forEach(function(step, i){
      var isDone=i<currentIdx||(allStatuses.includes(step.status)&&i<=currentIdx);
      var isActive=o.status===step.status;
      var isCancelled=(o.status==='cancelled'||o.status==='rejected')&&!isDone&&!isActive;

      var dotCls=isDone?'fs-done':isActive?'fs-active':'fs-wait';
      var stepCls=isDone?'done':isActive?'active':'';

      // Find timestamp from history
      var hist=(o.statusHistory||[]).find(function(h){return h.status===step.status;});
      var ts=hist&&hist.timestamp?new Date(hist.timestamp).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      var note=hist&&hist.note?hist.note:'';

      html+='<div class="flow-step '+stepCls+'">'
        +'<div class="fs-dot '+dotCls+'">'+(isDone?'✓':isActive?'●':(i+1))+'</div>'
        +'<div class="fs-body">'
        +'<div class="fs-title">'+step.icon+' '+step.title+'</div>'
        +'<div class="fs-sub">'+step.sub+'</div>'
        +(ts?'<div class="fs-sub" style="color:#e8a020;margin-top:2px">'+ts+'</div>':'')
        +(note&&note!==step.sub?'<div class="fs-sub" style="font-style:italic;color:#888">'+note+'</div>':'')
        +(isNormal&&(step.status==='picked_up'||step.status==='out_for_delivery')?renderSlotConfirmStatus(o,step.status):'')
        +'</div></div>';
    });
    html+='</div></div>';

    // ── STATUS HISTORY ──────────────────────────────────────────────────
    if((o.statusHistory||[]).length>0){
      html+='<div class="detail-section"><h4>Full Timeline</h4>'
        +(o.statusHistory||[]).slice().reverse().map(function(h){
          var ts=h.timestamp?new Date(h.timestamp).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
          return '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f5f1ea">'
            +'<div style="font-size:0.75rem;font-weight:600;color:#1a1108">'+h.status.replace(/_/g,' ')+'</div>'
            +'<div style="text-align:right"><div style="font-size:0.68rem;color:#888">'+ts+'</div>'
            +(h.note?'<div style="font-size:0.65rem;color:#aaa;max-width:180px;text-align:right">'+h.note+'</div>':'')+'</div></div>';
        }).join('')+'</div>';
    }

    showResults(html);
  }).catch(function(err){ showResults('<div class="empty">Error loading order: '+err.message+'</div>'); });
}

// Helper: render slot confirmation status for normal delivery steps
function renderSlotConfirmStatus(o, stepStatus){
  var tripType=stepStatus==='picked_up'?'pickup':'delivery';
  var trip=(o.trips||[]).find(function(t){return t.type===tripType;});
  if(!trip) return '';
  var confirmed=trip.riderConfirmed;
  var confirming=trip.status==='confirming'&&!confirmed;
  var slot=o.normalSlot==='morning'?'☀️ Morning (7-10 AM)':'🌙 Evening (5-7 PM)';
  var deadline=trip.confirmationDeadline?new Date(trip.confirmationDeadline):null;
  var minsLeft=deadline?Math.max(0,Math.round((deadline-Date.now())/60000)):null;
  var txt=confirmed?'<span class="fs-tag tag-ok">✓ Rider confirmed for '+slot+' slot</span>'
    :confirming?'<span class="fs-tag tag-warn">⏰ Awaiting rider confirm — '+minsLeft+'m left · '+slot+'</span>'
    :trip.riderId?'<span class="fs-tag tag-blue">Rider assigned · '+slot+'</span>'
    :'<span class="fs-tag tag-err">No rider assigned yet · '+slot+'</span>';
  return '<div style="margin-top:6px">'+txt+'</div>';
}

      +'<div class="an-box"><div class="an-val">₹'+s.totalCashbackGiven+'</div><div class="an-lbl">Cashback Given</div></div>'
      +'<div class="an-box"><div class="an-val">₹'+s.totalRiderPayout+'</div><div class="an-lbl">Rider Payout</div></div>'
      +'<div class="an-box" style="border-color:#e8a020"><div class="an-val" style="color:#e8a020">₹'+s.netProfit+'</div><div class="an-lbl">Net Profit</div></div>'
      +'</div></div>';
    showResults(html);
  }).catch(function(){showResults('<div class="empty">Error</div>');});
}

// RANKINGS
function loadRankings(period){
  fetch(API+'/api/admin/rankings?period='+period,{headers:authHdr()})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.success){showResults('<div class="empty">Error loading rankings</div>');return;}
    var html='<div class="rcard"><div class="rcard-name" style="margin-bottom:12px">🏆 Top Rankings — '+d.period+'</div>';
    html+='<div style="font-size:0.75rem;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">👤 Top Customers</div>';
    (d.topCustomers||[]).slice(0,5).forEach(function(c,i){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f1ea"><span style="font-weight:600">#'+(i+1)+' '+c.name+'</span><span style="color:#888">'+c.count+' orders · ₹'+c.spent+'</span></div>';
    });
    html+='<div style="font-size:0.75rem;font-weight:700;color:#888;margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.06em">🏪 Top Vendors</div>';
    (d.topVendors||[]).slice(0,5).forEach(function(v,i){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f1ea"><span style="font-weight:600">#'+(i+1)+' '+v.name+'</span><span style="color:#888">'+v.count+' orders</span></div>';
    });
    html+='<div style="font-size:0.75rem;font-weight:700;color:#888;margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.06em">🏍 Top Riders</div>';
    (d.topRiders||[]).slice(0,5).forEach(function(r,i){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f1ea"><span style="font-weight:600">#'+(i+1)+' '+(r.name||'Rider')+'</span><span style="color:#888">'+r.count+' trips · ₹'+r.earned+'</span></div>';
    });
    html+='</div>';
    showResults(html);
  }).catch(function(){showResults('<div class="empty">Error</div>');});
}

// PENDING UI
function updatePendingUI(){
  var pendingRiders=allRiders.filter(function(r){return !r.approved&&!r.rejected&&!r.revoked;});
  var pendingVendors=allVendors.filter(function(v){return !v.isApproved;});
  var total=pendingRiders.length+pendingVendors.length;
  document.getElementById('statPending').textContent=total;

  // Badges
  var rb=document.getElementById('riderBadge');
  rb.textContent=pendingRiders.length; rb.className='tab-badge'+(pendingRiders.length>0?' show':'');
  var vb=document.getElementById('vendorBadge');
  vb.textContent=pendingVendors.length; vb.className='tab-badge'+(pendingVendors.length>0?' show':'');

  // Banner
  var banner=document.getElementById('pendingBanner');
  if(total>0){
    banner.classList.add('show');
    var parts=[];
    if(pendingRiders.length)parts.push(pendingRiders.length+' rider application'+(pendingRiders.length>1?'s':''));
    if(pendingVendors.length)parts.push(pendingVendors.length+' vendor shop'+(pendingVendors.length>1?'s':''));
    document.getElementById('pendingText').textContent=parts.join(' · ')+' waiting for approval';
  } else {
    banner.classList.remove('show');
  }
}


// ── UPCOMING SLOTS ──────────────────────────────────────────────────────────
function loadUpcomingSlots() {
  fetch(API+'/api/admin/orders',{headers:authHdr()})
  .then(function(r){return r.json();})
  .then(function(d){
    var orders=(d.orders||[]).filter(function(o){
      return o.deliveryType==='normal' && ['placed','accepted','vendor_accepted','pickup_scheduled'].includes(o.status);
    });
    if(!orders.length){showResults('<div class="empty">No upcoming normal delivery slots</div>');return;}

    // Group by slot
    var morning=orders.filter(function(o){return o.normalSlot==='morning';});
    var evening=orders.filter(function(o){return o.normalSlot==='evening';});
    var unslotted=orders.filter(function(o){return !o.normalSlot;});

    var html='<div style="margin-bottom:12px;font-weight:700;font-size:0.88rem;color:#1a1108">📅 Upcoming Normal Delivery Slots</div>';

    if(morning.length){
      html+='<div class="rcard" style="margin-bottom:10px;border-left:4px solid #e8a020">';
      html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:0.9rem;margin-bottom:6px">☀️ Morning Slot (7–10 AM) · '+morning.length+' order(s)</div>';
      morning.forEach(function(o){
        var cust=o.customer&&o.customer.name?o.customer.name:'Customer';
        var area=o.pickupAddress&&o.pickupAddress.area?o.pickupAddress.area:'';
        var riderAssigned=o.trips&&o.trips.some(function(t){return t.riderId;});
        html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f1ea;font-size:0.82rem">'
          +'<span><strong>'+cust+'</strong>'+(area?' · '+area:'')+'</span>'
          +'<span style="font-size:0.72rem;padding:3px 8px;border-radius:10px;background:'+(riderAssigned?'#f0fdf4':'#fef9ec')+';color:'+(riderAssigned?'#166534':'#92400e')+'">'
          +(riderAssigned?'✓ Rider assigned':'⏳ No rider yet')+'</span>'
          +'</div>';
      });
      html+='</div>';
    }

    if(evening.length){
      html+='<div class="rcard" style="margin-bottom:10px;border-left:4px solid #4361ee">';
      html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:0.9rem;margin-bottom:6px">🌙 Evening Slot (5–7 PM) · '+evening.length+' order(s)</div>';
      evening.forEach(function(o){
        var cust=o.customer&&o.customer.name?o.customer.name:'Customer';
        var area=o.pickupAddress&&o.pickupAddress.area?o.pickupAddress.area:'';
        var riderAssigned=o.trips&&o.trips.some(function(t){return t.riderId;});
        html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f1ea;font-size:0.82rem">'
          +'<span><strong>'+cust+'</strong>'+(area?' · '+area:'')+'</span>'
          +'<span style="font-size:0.72rem;padding:3px 8px;border-radius:10px;background:'+(riderAssigned?'#f0fdf4':'#fef9ec')+';color:'+(riderAssigned?'#166534':'#92400e')+'">'
          +(riderAssigned?'✓ Rider assigned':'⏳ No rider yet')+'</span>'
          +'</div>';
      });
      html+='</div>';
    }

    if(unslotted.length){
      html+='<div class="rcard" style="border-left:4px solid #dc2626">';
      html+='<div style="font-family:Syne,sans-serif;font-weight:800;font-size:0.9rem;margin-bottom:6px;color:#dc2626">⚠️ No Slot Assigned · '+unslotted.length+' order(s)</div>';
      unslotted.forEach(function(o){
        var cust=o.customer&&o.customer.name?o.customer.name:'Customer';
        html+='<div style="padding:4px 0;font-size:0.82rem;border-bottom:1px solid #f5f1ea"><strong>'+cust+'</strong> · ₹'+(o.totalAmount||0)+'</div>';
      });
      html+='</div>';
    }

    showResults(html);
  }).catch(function(){showResults('<div class="empty">Error loading slots</div>');});
}
