<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DhobiWala — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#07090f;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#0f1629;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 40px;max-width:440px;width:90%;text-align:center;}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:4px;}
.logo span{color:#fbbf24;}
.badge{display:inline-block;background:rgba(239,68,68,0.15);color:#ef4444;border-radius:20px;padding:4px 14px;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;margin-bottom:28px;}
h2{font-family:'Playfair Display',serif;color:#fff;font-size:1.4rem;margin-bottom:8px;}
p{color:#475569;font-size:0.88rem;line-height:1.6;margin-bottom:28px;}
.form-group{text-align:left;margin-bottom:16px;}
label{display:block;font-size:0.72rem;font-weight:700;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;}
input{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;background:rgba(255,255,255,0.06);color:#fff;transition:border 0.2s;}
input:focus{border-color:#ef4444;}
input::placeholder{color:#334155;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:14px;font-size:0.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px;}
.stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;color:#fbbf24;font-size:1.2rem;font-weight:700;}
.stat-lbl{color:#475569;font-size:0.65rem;margin-top:2px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🧺 Dhobi<span>Wala</span></div>
  <div class="badge">◆ ADMIN CONTROL</div>

  <div class="stats">
    <div class="stat"><div class="stat-val">18+</div><div class="stat-lbl">Shops</div></div>
    <div class="stat"><div class="stat-val">24</div><div class="stat-lbl">Riders</div></div>
    <div class="stat"><div class="stat-val">1.2k</div><div class="stat-lbl">Users</div></div>
  </div>

  <h2>Admin Login</h2>
  <p>Access the control panel to manage shops, riders, orders and platform analytics.</p>

  <div class="form-group">
    <label>Admin Email</label>
    <input type="email" placeholder="admin@dhobiwala.com"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="••••••••"/>
  </div>
  <button class="btn" onclick="alert('Admin panel coming soon!\nAPI: https://dhobiwala-backend.onrender.com')">Access Admin Panel →</button>

  <p style="margin-top:20px;font-size:0.75rem;color:#334155;">Restricted access — authorised personnel only</p>
</div>
</body>
</html>
