<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shuchi Admin (DEV)</title>
<style>
  /* ─── POINTER CURSOR FOR CLICKABLES ─────────────────────────────────────── */
  [onclick],
  [role="button"],
  button,
  a[href],
  .btn, .tab, .filter, .pill, .icon-btn, .nav-btn, .nav-item, .ck, .av,
  .modal-bg, .modal-close, .switch, .switch input, .slider,
  label[for], select,
  input[type="checkbox"],
  input[type="radio"],
  input[type="submit"],
  input[type="button"],
  input[type="file"] {
    cursor: pointer;
  }
  [onclick][disabled],
  button[disabled],
  button:disabled,
  .btn[disabled],
  .btn:disabled,
  .btn.disabled {
    cursor: not-allowed;
  }
  input[type="text"],
  input[type="tel"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  input[type="search"],
  input[type="url"],
  input:not([type]),
  textarea {
    cursor: text;
  }
  /* ──────────────────────────────────────────────────────────────────────── */

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f1e8; color: #1a1a1a; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body { padding: 16px; max-width: 1200px; margin: 0 auto; padding-bottom: 80px; }

  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .brand { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .brand .accent { color: #ed8936; }
  .sub { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .logout { background: #fff; border: 1px solid #ddd; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .logout:active { background: #f0f0f0; }

  /* Live indicator (top-right) */
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #999; margin-right: 6px; }
  .live-dot.connected { background: #2e7d32; box-shadow: 0 0 6px rgba(46, 125, 50, 0.6); animation: pulse 2s infinite; }
  .live-dot.disconnected { background: #c62828; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-status { font-size: 11px; color: #666; display: flex; align-items: center; }

  .login-wrap { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .login-card { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .login-card h2 { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
  .login-card .v { font-size: 11px; color: #999; margin: 8px 0 16px; }
  .err { background: #fee; color: #c00; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
  .ok  { background: #e8f5e9; color: #2e7d32; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: #666; letter-spacing: 1.5px; margin: 12px 0 6px; text-transform: uppercase; }
  input[type=email], input[type=password], input[type=text], input[type=search], select {
    width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #d8d4cb; border-radius: 8px; background: #faf7f0;
    font-family: inherit; outline: none;
  }
  input:focus, select:focus { border-color: #ed8936; background: #fff; }

  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 48px; }
  .pass-toggle { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border: none; background: transparent; font-size: 18px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; }
  .pass-toggle:active { background: #f0f0f0; }
  .pass-toggle.shown { color: #ed8936; }
  .btn-primary { width: 100%; background: #1a1a1a; color: #fff; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; margin-top: 18px; }
  .btn-primary:active { background: #333; }
  .btn-primary:disabled { opacity: 0.5; }

  .banner { background: linear-gradient(135deg, #6b46c1, #8b5cf6); color: #fff; padding: 16px 18px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
  .banner.alert { background: linear-gradient(135deg, #c62828, #ef5350); }
  .banner .ttl { font-size: 17px; font-weight: 700; }
  .banner .sub2 { font-size: 13px; opacity: 0.9; margin-top: 2px; }
  .banner .review-btn { background: rgba(255,255,255,0.25); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .banner .review-btn:active { background: rgba(255,255,255,0.4); }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (min-width: 720px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat { background: #fff; padding: 16px; border-radius: 12px; }
  .stat .num { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 11px; font-weight: 700; color: #666; letter-spacing: 1.2px; margin-top: 6px; text-transform: uppercase; }
  .stat.alert .num { color: #c62828; }

  .tabs { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  .tab { background: #fff; border: 1px solid #e8e2d5; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; white-space: nowrap; position: relative; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .tab.alerts-tab.has-alerts { background: #c62828; color: #fff; border-color: #c62828; animation: alert-pulse 2s infinite; }
  .tab.alerts-tab.has-alerts.active { background: #c62828; color: #fff; }
  @keyframes alert-pulse { 0%,100%{box-shadow: 0 0 0 0 rgba(198,40,40,0.7)} 50%{box-shadow: 0 0 0 8px rgba(198,40,40,0)} }
  .tab .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; background: #e53e3e; color: #fff; border-radius: 999px; font-size: 11px; font-weight: 800; margin-left: 4px; }
  .tab.alerts-tab.has-alerts .badge { background: #fff; color: #c62828; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter { background: #fff; border: 1px solid #e8e2d5; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; }
  .filter.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: background 0.5s; }
  .card.flash-red { background: #fee; }
  .card-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .card-ttl { font-size: 17px; font-weight: 700; line-height: 1.3; }
  .card-meta { font-size: 13px; color: #666; margin-top: 2px; line-height: 1.5; }
  .card-meta .row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .pill.pending { background: #fff3cd; color: #856404; }
  .pill.approved { background: #d1f2dd; color: #1a7f3d; }
  .pill.rejected, .pill.cancelled { background: #fde2e2; color: #c53030; }
  .pill.revoked { background: #e0e0e0; color: #555; }
  .pill.warning { background: #fff3cd; color: #856404; }
  .pill.critical { background: #fde2e2; color: #c53030; animation: alert-pulse 2s infinite; }
  .pill.escalation-nudged { background: #fef3c7; color: #92400e; }
  .pill.escalation-final { background: #fed7aa; color: #9a3412; }
  .pill.escalation-reassigned { background: #dbeafe; color: #1e40af; }
  .pill.escalation-cancelled { background: #fde2e2; color: #c53030; }
  .pill.closed { background: #f0f0f0; color: #666; font-size: 10px; padding: 2px 8px; }
  .pill.delivered { background: #d1f2dd; color: #1a7f3d; }
  .pill.processing, .pill.in_progress { background: #dbeafe; color: #1e40af; }
  .pill.score-1, .pill.score-2 { background: #fde2e2; color: #c53030; }
  .pill.score-3 { background: #fff3cd; color: #856404; }
  .pill.score-4, .pill.score-5 { background: #d1f2dd; color: #1a7f3d; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .actions.three { grid-template-columns: 1fr 1fr 1fr; }
  .actions.one { grid-template-columns: 1fr; }
  .btn { padding: 12px 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn:disabled { opacity: 0.4; }
  .btn-approve { background: #2e7d32; color: #fff; }
  .btn-reject  { background: #c62828; color: #fff; }
  .btn-revoke  { background: #ef6c00; color: #fff; }
  .btn-reset   { background: #f5f1e8; color: #444; border: 1px solid #d8d4cb; }
  .btn-view    { background: #f0f0f0; color: #333; }
  .btn-warn    { background: #f59e0b; color: #fff; }
  .btn-info    { background: #3b82f6; color: #fff; }

  .empty { text-align: center; color: #999; padding: 36px 16px; background: #fff; border-radius: 14px; font-size: 14px; }
  .loading { text-align: center; color: #999; padding: 24px; font-size: 13px; }

  /* Modal for timelines / details */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none;
    align-items: center; justify-content: center; padding: 16px; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; max-width: 700px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 0;
  }
  .modal-hdr {
    padding: 18px 20px; border-bottom: 1px solid #e8e2d5; display: flex;
    align-items: center; justify-content: space-between; gap: 8px;
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .modal-hdr h3 { font-size: 18px; font-weight: 800; }
  .modal-close {
    background: #f5f1e8; border: none; width: 32px; height: 32px; border-radius: 50%;
    font-size: 18px; font-weight: 700;
  }
  .modal-body { padding: 18px 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid #e8e2d5; }

  /* Timeline */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ""; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px; background: #e8e2d5; }
  .tl-event { position: relative; margin-bottom: 14px; }
  .tl-event::before { content: ""; position: absolute; left: -22px; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 2px solid #ed8936; }
  .tl-event.escalation::before { background: #fff3cd; border-color: #f59e0b; }
  .tl-event.cancel::before { background: #fde2e2; border-color: #c62828; }
  .tl-event.resolve::before { background: #d1f2dd; border-color: #2e7d32; }
  .tl-time { font-size: 11px; color: #999; }
  .tl-label { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .tl-meta { font-size: 12px; color: #666; margin-top: 2px; font-style: italic; }

  /* Star display */
  .stars-ro { color: #f59e0b; font-size: 16px; letter-spacing: 1px; }

  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 1000; max-width: calc(100vw - 32px); text-align: center; }
  #toast.show { opacity: 1; }
  #toast.err { background: #c62828; }
  #toast.ok { background: #2e7d32; }

  .dev-badge { display: inline-block; background: #ed8936; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 999px; letter-spacing: 1px; margin-left: 6px; vertical-align: middle; }

  /* Ratings tab specific */
  .rating-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0ebe0; gap: 8px; flex-wrap: wrap; }
  .rating-row:last-child { border-bottom: none; }
  .rating-row .target { font-weight: 600; }
  .rating-row .review-text { font-size: 13px; color: #555; font-style: italic; margin-top: 4px; max-width: 100%; }

  /* Stats tile for ratings dashboard */
  .stat-tile { background: #fff; padding: 14px; border-radius: 12px; margin-bottom: 10px; }
  .stat-tile h4 { font-size: 12px; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .top-list { font-size: 14px; }
  .top-list .row { display: flex; justify-content: space-between; padding: 5px 0; }
</style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN ═══════════════════════════════ -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="brand">Shu<span class="accent">chi</span></div>
    <div style="font-family:serif;font-size:13px;color:#666;letter-spacing:1px;margin:4px 0">शुचिता सर्वदा</div>
    <h2>Admin Panel <span class="dev-badge">DEV</span></h2>
    <div class="v">v4.0 · Backend: dev</div>
    <div id="loginErr"></div>
    <label>Admin Email</label>
    <input id="email" type="email" value="admin@shuchi.in" autocomplete="username">
    <label>Password</label>
    <div class="pass-wrap">
      <input id="pass" type="password" value="ShuchiAdmin@2026" autocomplete="current-password">
      <button type="button" class="pass-toggle" id="passToggle" onclick="togglePass()" aria-label="Show password">👁</button>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Access Admin Panel →</button>
  </div>
</div>

<!-- ═══════════════════════════════ DASHBOARD ═══════════════════════════════ -->
<div id="dashboard" style="display:none">
  <div class="hdr">
    <div>
      <div class="brand">Shu<span class="accent">chi</span> Admin <span class="dev-badge">DEV</span></div>
      <div class="sub">Operations Dashboard <span class="live-status"><span class="live-dot disconnected" id="liveDot"></span> <span id="liveText">connecting…</span></span></div>
    </div>
    <button class="logout" onclick="doLogout()">Logout</button>
  </div>

  <div id="alertBanner" style="display:none"></div>
  <div id="pendingBanner" style="display:none"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="statActiveOrders">—</div><div class="lbl">Active Orders</div></div>
    <div class="stat"><div class="num" id="statRidersOnDuty">—</div><div class="lbl">Riders on Duty</div></div>
    <div class="stat alert"><div class="num" id="statAlerts">—</div><div class="lbl">🚨 Alerts</div></div>
    <div class="stat"><div class="num" id="statPending">—</div><div class="lbl">Pending</div></div>
  </div>

  <div class="tabs">
    <div class="tab alerts-tab" data-tab="alerts" onclick="switchTab('alerts')">🚨 Alerts <span id="alertBadge" class="badge" style="display:none">0</span></div>
    <div class="tab" data-tab="orders" onclick="switchTab('orders')">📦 Orders</div>
    <div class="tab" data-tab="riders" onclick="switchTab('riders')">🛵 Riders</div>
    <div class="tab active" data-tab="vendors" onclick="switchTab('vendors')">🏪 Vendors <span id="vendorBadge" class="badge" style="display:none">0</span></div>
    <div class="tab" data-tab="customers" onclick="switchTab('customers')">👤 Customers</div>
    <div class="tab" data-tab="ratings" onclick="switchTab('ratings')">⭐ Ratings</div>
    <div class="tab" data-tab="analytics" onclick="switchTab('analytics')">📈 Analytics</div>
    <div class="tab" data-tab="rankings" onclick="switchTab('rankings')">🏆 Top</div>
  </div>

  <div id="filterBar" class="filters"></div>

  <div id="content"></div>
</div>

<!-- Modal for order timeline + escalation details -->
<div class="modal-bg" id="modalBg" onclick="closeModalIfBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h3 id="modalTitle">Order Timeline</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading">Loading…</div>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// ═══════════════════════════════ CONFIG ═══════════════════════════════
const API = "https://dhobiwala-backend-dev.onrender.com";
let token = localStorage.getItem("admin_token") || "";
let activeTab = "vendors";
let activeFilter = "all";
let cache = { vendors: [], riders: [], orders: [], customers: [], stuck: [], escalations: [], ratings: [], ratingStats: null, analytics: null, rankings: null };
let analyticsPeriod = "daily";
let rankingsPeriod  = "weekly";
let socket = null;
let pollTimer = null;
let modalContext = null; // { orderId } when modal is showing an order

// ═══════════════════════════════ HELPERS ═══════════════════════════════
function $(id) { return document.getElementById(id); }
function toast(msg, kind) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "show " + (kind || "");
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { t.className = ""; }, 2400);
}
async function api(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  if (opts.body && typeof opts.body !== "string") {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(API + path, opts);
  let json = null;
  try { json = await res.json(); } catch (e) { json = { success: false, message: "Bad response" }; }
  if (res.status === 401 || res.status === 403) {
    localStorage.removeItem("admin_token");
    token = "";
    showLogin();
    throw new Error("auth");
  }
  return json;
}
function escHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c];
  });
}
function fmtTime(d) {
  if (!d) return "—";
  const date = new Date(d);
  const now  = new Date();
  const diff = (now - date) / 1000;
  if (diff < 60)        return Math.floor(diff) + "s ago";
  if (diff < 3600)      return Math.floor(diff / 60) + "m ago";
  if (diff < 86400)     return Math.floor(diff / 3600) + "h ago";
  return date.toLocaleString();
}
function fmtAbs(d) {
  if (!d) return "—";
  return new Date(d).toLocaleString();
}
function starsRO(score) {
  let s = "";
  for (let i = 1; i <= 5; i++) s += (i <= score ? "★" : "☆");
  return s;
}

// ═══════════════════════════════ AUTH ═══════════════════════════════
function togglePass() {
  const inp = $("pass"), btn = $("passToggle");
  if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; btn.classList.add("shown"); }
  else                          { inp.type = "password"; btn.textContent = "👁"; btn.classList.remove("shown"); }
}
async function doLogin() {
  const email = $("email").value.trim();
  const password = $("pass").value;
  $("loginErr").innerHTML = "";
  $("loginBtn").disabled = true;
  $("loginBtn").textContent = "Logging in...";
  try {
    const r = await fetch(API + "/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.message || "Login failed");
    token = j.token;
    localStorage.setItem("admin_token", token);
    showDashboard();
  } catch (err) {
    $("loginErr").innerHTML = '<div class="err">' + escHtml(err.message) + '</div>';
  } finally {
    $("loginBtn").disabled = false;
    $("loginBtn").textContent = "Access Admin Panel →";
  }
}
function doLogout() {
  localStorage.removeItem("admin_token");
  token = "";
  if (socket) { try { socket.disconnect(); } catch(_){} socket = null; }
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  showLogin();
}
function showLogin() {
  $("loginScreen").style.display = "flex";
  $("dashboard").style.display = "none";
}
function showDashboard() {
  $("loginScreen").style.display = "none";
  $("dashboard").style.display = "block";
  // Request notification permission (best-effort)
  if (typeof Notification !== "undefined" && Notification.permission === "default") {
    Notification.requestPermission().catch(function(){});
  }
  loadAll();
  setupSocket();
  setupPolling();
}

// ═══════════════════════════════ SOCKET.IO + POLLING ═══════════════════════════════
function setupSocket() {
  if (socket) try { socket.disconnect(); } catch(_) {}
  try {
    socket = io(API, { transports: ["websocket", "polling"], reconnection: true, reconnectionDelay: 2000 });
  } catch(e) { console.error("socket init failed", e); return; }

  socket.on("connect",    function () { setLive(true);  });
  socket.on("disconnect", function () { setLive(false); });

  // Stuck-order detector events
  socket.on("stuck_alert", function (payload) {
    onAlertEvent(payload, "🚨 Stuck order: " + (payload.orderNumber || ""), payload.stuckReason || "Order is stuck", "critical");
  });
  socket.on("stuck_alert_acknowledged", function () { refreshAlerts(); });

  // Rider interlock events
  socket.on("rider_locked",   function (payload) { onAlertEvent(payload, "🔒 Rider locked: " + (payload.orderNumber || ""), payload.reason || "", "warning"); });
  socket.on("rider_unlocked", function () { refreshAlerts(); });

  // No-show escalator events
  socket.on("rider_no_show_nudge",         function (p) { onAlertEvent(p, "⏰ Nudge: " + (p.orderNumber || ""), "Rider has not arrived", "warning"); });
  socket.on("rider_no_show_final_alert",   function (p) { onAlertEvent(p, "🚨 Final alert: " + (p.orderNumber || ""), "Rider may be ghosting", "critical"); });
  socket.on("rider_no_show_reassigned",    function (p) { onAlertEvent(p, "🔄 Reassigned: " + (p.orderNumber || ""), (p.fromRiderId ? "From rider " : "") + (p.toRiderName || ""), "warning"); });
  socket.on("rider_no_show_reassign_failed", function (p) { onAlertEvent(p, "⚠️ Reassign failed: " + (p.orderNumber || ""), "No replacement available", "critical"); });

  // Order events
  socket.on("order_cancelled", function (p) { onAlertEvent(p, "❌ Order cancelled: " + (p.orderNumber || ""), p.reason || "", "critical"); });

  // Live order lifecycle updates — refresh the Orders tab if it's currently visible.
  // Also refresh the timeline modal if it's showing the order that just changed.
  socket.on("order_update", function (payload) {
    if (!payload) return;
    // If the timeline modal is open for this order, refresh it
    if (modalContext && modalContext.orderId && payload.orderId &&
        String(modalContext.orderId) === String(payload.orderId)) {
      openTimeline(payload.orderId);
    }
    // If the user is on the Orders tab, refresh in-place
    if (activeTab === "orders") {
      loadOrders().then(renderTab);
    }
    // Update live stats (active orders count may have changed)
    loadAll();
  });

  // Live rating events — refresh ratings tab if visible, otherwise mark stale
  socket.on("order_rated", function (payload) {
    if (!payload) return;
    if (activeTab === "ratings") {
      loadRatings().then(renderTab);
    }
    // Brief acknowledgement so admin knows a rating just came in
    toast("⭐ New rating: " + (payload.orderNumber || "order"), "ok");
  });
}

function setLive(connected) {
  const dot = $("liveDot"), txt = $("liveText");
  if (!dot || !txt) return;
  dot.className = "live-dot " + (connected ? "connected" : "disconnected");
  txt.textContent = connected ? "live" : "reconnecting…";
}

function setupPolling() {
  if (pollTimer) clearInterval(pollTimer);
  // Poll every 30s as a safety net (covers socket disconnects)
  pollTimer = setInterval(function () {
    if ($("dashboard").style.display === "none") return;
    refreshAlerts();
    if (activeTab === "orders")    loadOrders().then(renderTab);
    if (activeTab === "riders")    loadRiders().then(renderTab);
    if (activeTab === "vendors")   loadVendors().then(renderTab);
    if (activeTab === "ratings")   loadRatings().then(renderTab);
  }, 30000);
}

// Generic alert event handler — flashes the order's card if visible + browser notification
function onAlertEvent(payload, title, body, severity) {
  // Browser notification on critical
  if (severity === "critical" && typeof Notification !== "undefined" && Notification.permission === "granted") {
    try { new Notification(title, { body: body, icon: "/icon-192.png" }); } catch(_) {}
  }
  // Flash the matching order card if rendered
  if (payload.orderId) {
    const card = document.querySelector('[data-order-id="' + payload.orderId + '"]');
    if (card) {
      card.classList.add("flash-red");
      setTimeout(function () { card.classList.remove("flash-red"); }, 3000);
    }
  }
  // Refresh the alerts data so the count + tab badge update
  refreshAlerts();
  // Toast for general visibility
  toast(title, severity === "critical" ? "err" : "");
}

async function refreshAlerts() {
  try {
    await Promise.all([loadStuck(), loadEscalations()]);
    updateAlertCount();
    if (activeTab === "alerts") renderTab();
  } catch (e) { /* ignore */ }
}

function updateAlertCount() {
  const total = cache.stuck.length + cache.escalations.filter(function(o){ return o.stage !== "auto_cancelled" && o.stage !== "reassigned"; }).length;
  $("statAlerts").textContent = total;
  const tab = document.querySelector('.tab.alerts-tab');
  const badge = $("alertBadge");
  if (total > 0) {
    tab.classList.add("has-alerts");
    badge.style.display = "inline-flex";
    badge.textContent = total;
  } else {
    tab.classList.remove("has-alerts");
    badge.style.display = "none";
  }
  // Banner
  if (total > 0) {
    $("alertBanner").style.display = "block";
    $("alertBanner").innerHTML =
      '<div class="banner alert">' +
        '<div>' +
          '<div class="ttl">🚨 ' + total + ' active alert' + (total > 1 ? 's' : '') + '</div>' +
          '<div class="sub2">Orders need your attention</div>' +
        '</div>' +
        '<button class="review-btn" onclick="switchTab(\'alerts\')">Review</button>' +
      '</div>';
  } else {
    $("alertBanner").style.display = "none";
  }
}

// ═══════════════════════════════ DATA LOAD ═══════════════════════════════
async function loadAll() {
  try {
    const live = await api("/api/admin/live");
    if (live.success) {
      $("statActiveOrders").textContent = live.activeOrders ?? 0;
      $("statRidersOnDuty").textContent = live.onDutyRiders ?? 0;
    }
  } catch (e) {}
  await Promise.all([loadVendors(), loadRiders(), loadStuck(), loadEscalations()]);
  updateAlertCount();
  renderTab();
}

async function loadVendors() {
  try {
    const r = await api("/api/admin/vendors");
    if (r.success) {
      cache.vendors = r.shops || [];
      const pending = cache.vendors.filter(function (s) { return !s.isApproved; }).length;
      $("statPending").textContent = pending;
      const b = $("vendorBadge");
      if (pending > 0) { b.style.display = "inline-flex"; b.textContent = pending; }
      else { b.style.display = "none"; }
      if (pending > 0) {
        $("pendingBanner").style.display = "block";
        $("pendingBanner").innerHTML =
          '<div class="banner">' +
            '<div>' +
              '<div class="ttl">⚠️ Pending Approvals</div>' +
              '<div class="sub2">' + pending + ' shop' + (pending > 1 ? "s" : "") + ' pending approval</div>' +
            '</div>' +
            '<button class="review-btn" onclick="reviewPending()">Review Now</button>' +
          '</div>';
      } else { $("pendingBanner").style.display = "none"; }
    }
  } catch (e) { console.error("loadVendors", e); }
}

// ═══════════════════════════════ TABS / FILTER ═══════════════════════════════
function switchTab(t) {
  activeTab = t;
  activeFilter = "all";
  document.querySelectorAll(".tab").forEach(function (el) {
    el.classList.toggle("active", el.dataset.tab === t);
  });
  if (t === "orders"    && cache.orders.length === 0)   loadOrders().then(renderTab);
  else if (t === "customers" && cache.customers.length === 0) loadCustomers().then(renderTab);
  else if (t === "ratings"   && !cache.ratingStats)      loadRatings().then(renderTab);
  else if (t === "analytics" && !cache.analytics)        loadAnalytics().then(renderTab);
  else if (t === "rankings"  && !cache.rankings)         loadRankings().then(renderTab);
  else if (t === "alerts")                              { refreshAlerts(); renderTab(); }
  else renderTab();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('#filterBar .filter').forEach(function(el){
    el.classList.toggle("active", el.dataset.filter === f);
  });
  renderTab();
}

function reviewPending() {
  switchTab("vendors");
  setFilter("pending");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ═══════════════════════════════ RENDER ═══════════════════════════════
function renderTab() {
  if (activeTab === "alerts")    return renderAlerts();
  if (activeTab === "vendors")   return renderVendors();
  if (activeTab === "riders")    return renderRiders();
  if (activeTab === "orders")    return renderOrders();
  if (activeTab === "customers") return renderCustomers();
  if (activeTab === "ratings")   return renderRatings();
  if (activeTab === "analytics") return renderAnalytics();
  if (activeTab === "rankings")  return renderRankings();
}

function setFilters(filterDefs) {
  if (!filterDefs || !filterDefs.length) {
    $("filterBar").innerHTML = "";
    $("filterBar").style.display = "none";
    return;
  }
  $("filterBar").style.display = "flex";
  $("filterBar").innerHTML = filterDefs.map(function(f){
    return '<button class="filter ' + (activeFilter === f.value ? 'active' : '') + '" data-filter="' + f.value + '" onclick="setFilter(\'' + f.value + '\')">' + escHtml(f.label) + '</button>';
  }).join("");
}

// ── ALERTS TAB ────────────────────────────────────────────────────────────
function renderAlerts() {
  setFilters([
    { value: "all",         label: "All" },
    { value: "stuck",       label: "🚨 Stuck (" + cache.stuck.length + ")" },
    { value: "escalations", label: "⏰ No-show (" + cache.escalations.length + ")" },
  ]);

  let stuck     = cache.stuck;
  let escalate  = cache.escalations;
  if (activeFilter === "stuck")       escalate = [];
  if (activeFilter === "escalations") stuck    = [];

  if (!stuck.length && !escalate.length) {
    $("content").innerHTML = '<div class="empty">🎉 No active alerts! All orders are healthy.</div>';
    return;
  }

  let html = "";

  if (stuck.length) {
    html += '<h3 style="font-size:14px;color:#666;margin:8px 0;letter-spacing:1px;text-transform:uppercase">🚨 Stuck Orders (' + stuck.length + ')</h3>';
    html += stuck.map(function(o){
      // Backend /stuck endpoint returns flattened fields (severity, reason, stuckSince)
      // not nested under stuckAlert. Support both shapes for safety.
      const sev    = o.severity   || (o.stuckAlert && o.stuckAlert.stuckSeverity) || "warning";
      const reason = o.reason     || (o.stuckAlert && o.stuckAlert.stuckReason)   || "Stuck";
      const since  = o.stuckSince || (o.stuckAlert && o.stuckAlert.stuckSince)    || null;
      return (
        '<div class="card" data-order-id="' + o._id + '">' +
          '<div class="card-hdr">' +
            '<div>' +
              '<div class="card-ttl">#' + escHtml(o.orderNumber || "") + ' <span class="pill ' + escHtml(sev) + '">' + escHtml(sev.toUpperCase()) + '</span></div>' +
              '<div class="card-meta">' +
                '<div class="row">📋 ' + escHtml(reason) + '</div>' +
                '<div class="row">⏰ Stuck since: ' + fmtTime(since) + '</div>' +
                '<div class="row">📊 Status: ' + escHtml(o.status || "—") + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="actions three">' +
            '<button class="btn btn-info" onclick="openTimeline(\'' + o._id + '\')">📋 Timeline</button>' +
            '<button class="btn btn-warn" onclick="acknowledgeAlert(\'' + o._id + '\', this)">✓ Acknowledge</button>' +
            '<button class="btn btn-reject" onclick="forceCancelOrder(\'' + o._id + '\', this)">❌ Cancel</button>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  if (escalate.length) {
    html += '<h3 style="font-size:14px;color:#666;margin:14px 0 8px;letter-spacing:1px;text-transform:uppercase">⏰ Rider No-Show Escalations (' + escalate.length + ')</h3>';
    html += escalate.map(function(o){
      const stagePill = {
        "nudged":          '<span class="pill escalation-nudged">Nudged</span>',
        "final_alerted":   '<span class="pill escalation-final">Final alert</span>',
        "reassign_failed": '<span class="pill escalation-final">Reassign failed</span>',
        "reassigned":      '<span class="pill escalation-reassigned">Reassigned</span>',
        "auto_cancelled":  '<span class="pill escalation-cancelled">Auto-cancelled</span>',
      }[o.stage] || '<span class="pill warning">' + escHtml(o.stage || "—") + '</span>';

      const customerName = (o.customer && o.customer.name) || "—";
      const riderName    = (o.currentRider && o.currentRider.name) || "(no rider)";

      return (
        '<div class="card" data-order-id="' + o._id + '">' +
          '<div class="card-hdr">' +
            '<div>' +
              '<div class="card-ttl">#' + escHtml(o.orderNumber || "") + ' ' + stagePill + '</div>' +
              '<div class="card-meta">' +
                '<div class="row">👤 ' + escHtml(customerName) + ' · 🛵 ' + escHtml(riderName) + '</div>' +
                '<div class="row">📦 ' + escHtml(o.deliveryType || "—") + ' · ' + escHtml(o.status || "—") + '</div>' +
                (o.nudgedAt ? '<div class="row">⏰ First nudge: ' + fmtTime(o.nudgedAt) + '</div>' : '') +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="actions three">' +
            '<button class="btn btn-info" onclick="openTimeline(\'' + o._id + '\')">📋 Timeline</button>' +
            '<button class="btn btn-warn" onclick="forceReassignOrder(\'' + o._id + '\', this)">🔄 Reassign</button>' +
            '<button class="btn btn-reject" onclick="forceCancelOrder(\'' + o._id + '\', this)">❌ Cancel</button>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  $("content").innerHTML = html;
}

// ── ORDERS TAB ────────────────────────────────────────────────────────────
function renderOrders() {
  setFilters([
    { value: "all",       label: "All" },
    { value: "active",    label: "Active" },
    { value: "delivered", label: "Delivered" },
    { value: "cancelled", label: "Cancelled" },
  ]);
  let list = cache.orders;
  if (activeFilter === "active")    list = list.filter(function(o){ return !["delivered","cancelled"].includes(o.status); });
  if (activeFilter === "delivered") list = list.filter(function(o){ return o.status === "delivered"; });
  if (activeFilter === "cancelled") list = list.filter(function(o){ return o.status === "cancelled"; });

  if (!list.length) {
    $("content").innerHTML = '<div class="empty">No orders match this filter.</div>';
    return;
  }
  $("content").innerHTML = list.slice(0, 50).map(function (o) {
    const cust = (o.customer && o.customer.name) || "Customer";
    const shop = (o.shop && o.shop.name) || "Shop";
    const cancelled = o.status === "cancelled";
    return (
      '<div class="card" data-order-id="' + o._id + '">' +
        '<div class="card-hdr">' +
          '<div>' +
            '<div class="card-ttl">#' + escHtml(o.orderNumber || String(o._id).slice(-6)) + '</div>' +
            '<div class="card-meta">' +
              '<div class="row">👤 ' + escHtml(cust) + '</div>' +
              '<div class="row">🏪 ' + escHtml(shop) + '</div>' +
              '<div class="row">💰 ₹' + (o.totalAmount || 0) + ' · ' + escHtml(o.deliveryType || "—") + '</div>' +
              (cancelled && o.cancelReason ? '<div class="row">❌ ' + escHtml(o.cancelReason) + '</div>' : '') +
              (o.refundStatus === "pending" ? '<div class="row" style="color:#ef6c00;font-weight:600">💸 Refund pending: ₹' + (o.refundAmount || 0) + '</div>' : '') +
            '</div>' +
          '</div>' +
          '<div><span class="pill ' + escHtml(o.status || "pending") + '">' + escHtml(o.status || "—") + '</span></div>' +
        '</div>' +
        '<div class="actions one">' +
          '<button class="btn btn-info" onclick="openTimeline(\'' + o._id + '\')">📋 View Timeline</button>' +
        '</div>' +
      '</div>'
    );
  }).join("");
}

// ── VENDORS TAB ───────────────────────────────────────────────────────────
function renderVendors() {
  setFilters([
    { value: "all",     label: "All" },
    { value: "pending", label: "⏳ Pending Only" },
  ]);
  let list = cache.vendors;
  if (activeFilter === "pending") list = list.filter(function (s) { return !s.isApproved; });
  if (!list.length) {
    $("content").innerHTML = '<div class="empty">' + (activeFilter === "pending" ? "🎉 No pending vendors!" : "No vendors yet.") + '</div>';
    return;
  }
  $("content").innerHTML = list.map(function (s) {
    const status = s.isApproved
      ? '<span class="pill approved">✓ Approved</span>'
      : '<span class="pill pending">⏳ Pending</span>';
    const openBadge = s.isOpen
      ? '<span class="pill closed" style="background:#d1f2dd;color:#1a7f3d">● Open</span>'
      : '<span class="pill closed">● Closed</span>';
    const ownerName  = (s.owner && s.owner.name)  || "—";
    const ownerPhone = (s.owner && s.owner.phone) || "—";
    const area       = s.area || "—";
    const shopPhone  = s.phone || ownerPhone;
    const rt         = s.rating || {};
    const ratingChip = (rt.count && rt.count > 0)
      ? '<span class="stars-ro" style="font-size:13px;margin-left:6px">★ ' + (rt.average || 0).toFixed(1) + '</span><span style="font-size:12px;color:#666"> (' + rt.count + ')</span>'
      : '';

    let actions = "";
    if (!s.isApproved) {
      actions =
        '<div class="actions">' +
          '<button class="btn btn-approve" onclick="approveVendor(\'' + s._id + '\', this)">✓ Approve</button>' +
          '<button class="btn btn-reject" onclick="rejectVendor(\'' + s._id + '\', this)">✕ Reject</button>' +
        '</div>' +
        '<div class="actions one" style="margin-top:8px">' +
          '<button class="btn btn-reset" onclick="resetVendorPwd(\'' + ownerPhone + '\', this)">🔒 Reset Owner Password</button>' +
        '</div>';
    } else {
      actions =
        '<div class="actions">' +
          '<button class="btn btn-revoke" onclick="revokeVendor(\'' + s._id + '\', this)">⊘ Revoke</button>' +
          '<button class="btn btn-reset" onclick="resetVendorPwd(\'' + ownerPhone + '\', this)">🔒 Reset Owner Password</button>' +
        '</div>';
    }
    return (
      '<div class="card">' +
        '<div class="card-hdr">' +
          '<div>' +
            '<div class="card-ttl">' + escHtml(s.name) + ' ' + openBadge + ratingChip + '</div>' +
            '<div class="card-meta">' +
              '<div class="row">📍 ' + escHtml(area) + ' · ' + escHtml(shopPhone) + '</div>' +
              '<div class="row">👤 ' + escHtml(ownerName) + ' · ' + escHtml(ownerPhone) + '</div>' +
            '</div>' +
          '</div>' +
          '<div>' + status + '</div>' +
        '</div>' +
        actions +
      '</div>'
    );
  }).join("");
}

// ── RIDERS TAB ────────────────────────────────────────────────────────────
function renderRiders() {
  setFilters([
    { value: "all",     label: "All" },
    { value: "pending", label: "⏳ Pending Only" },
    { value: "locked",  label: "🔒 Locked" },
  ]);
  let list = cache.riders;
  if (activeFilter === "pending") list = list.filter(function (r) { return !r.approved && !r.rejected && !r.revoked; });
  if (activeFilter === "locked")  list = list.filter(function (r) { return r.isLocked; });
  if (!list.length) {
    $("content").innerHTML = '<div class="empty">' + (activeFilter !== "all" ? "Nothing matches this filter." : "No riders yet.") + '</div>';
    return;
  }
  $("content").innerHTML = list.map(function (r) {
    let status, actions;
    const lockBadge = r.isLocked ? ' <span class="pill critical">🔒 LOCKED</span>' : '';
    const ratingChip = (r.ratingCount && r.ratingCount > 0)
      ? '<span class="stars-ro" style="font-size:13px;margin-left:6px">★ ' + (r.avgRating || 0).toFixed(1) + '</span><span style="font-size:12px;color:#666"> (' + r.ratingCount + ')</span>'
      : '';
    if (r.revoked) {
      status = '<span class="pill revoked">⊘ Revoked</span>';
      actions = '<div class="actions one"><button class="btn btn-approve" onclick="approveRider(\'' + r._id + '\', this)">↻ Re-approve</button></div>';
    } else if (r.rejected) {
      status = '<span class="pill rejected">✕ Rejected</span>';
      actions = '<div class="actions one"><button class="btn btn-approve" onclick="approveRider(\'' + r._id + '\', this)">↻ Re-approve</button></div>';
    } else if (r.approved) {
      status = '<span class="pill approved">✓ Approved</span>';
      actions = '<div class="actions"><button class="btn btn-revoke" onclick="revokeRider(\'' + r._id + '\', this)">⊘ Revoke</button>' +
        '<button class="btn btn-reset" onclick="resetRiderPwd(\'' + (r.phone || '') + '\', this)">🔒 Reset Password</button></div>';
      if (r.isLocked) {
        actions += '<div class="actions one" style="margin-top:8px"><button class="btn btn-warn" onclick="unlockRider(\'' + r._id + '\', this)">🔓 Unlock Rider</button></div>';
      }
    } else {
      status = '<span class="pill pending">⏳ Pending</span>';
      actions = '<div class="actions"><button class="btn btn-approve" onclick="approveRider(\'' + r._id + '\', this)">✓ Approve</button>' +
        '<button class="btn btn-reject" onclick="rejectRider(\'' + r._id + '\', this)">✕ Reject</button></div>';
    }
    return (
      '<div class="card">' +
        '<div class="card-hdr">' +
          '<div>' +
            '<div class="card-ttl">' + escHtml(r.name || "Rider") + lockBadge + ratingChip + '</div>' +
            '<div class="card-meta">' +

// ═══════════════════════════════ MODAL: TIMELINE ════════════════════════════
function openModal(title, bodyHtml, footerHtml) {
  $("modalTitle").textContent = title;
  $("modalBody").innerHTML = bodyHtml || '<div class="loading">Loading…</div>';
  $("modalFooter").innerHTML = footerHtml || "";
  $("modalBg").classList.add("show");
}
function closeModal() {
  $("modalBg").classList.remove("show");
  modalContext = null;
}
function closeModalIfBg(e) { if (e.target === $("modalBg")) closeModal(); }

async function openTimeline(orderId) {
  modalContext = { orderId: orderId };
  openModal("Order Timeline", '<div class="loading">Loading…</div>', "");
  try {
    const [tl, esc] = await Promise.all([
      api("/api/admin/orders/" + orderId + "/timeline"),
      api("/api/admin/orders/" + orderId + "/escalation"),
    ]);
    if (!tl.success) throw new Error(tl.message || "Failed to load timeline");

    let html = '<div style="margin-bottom:14px">';
    html += '<h3 style="font-size:18px">#' + escHtml(tl.orderNumber || "") + '</h3>';
    html += '<div style="color:#666;font-size:13px">' + escHtml(tl.deliveryType || "—") + ' · status: <span class="pill ' + escHtml(tl.status || "pending") + '">' + escHtml(tl.status || "—") + '</span></div>';
    html += '</div>';

    if (esc && esc.success && esc.cancellation) {
      const c = esc.cancellation;
      html += '<div class="card" style="background:#fee;border:1px solid #fca5a5;margin-bottom:14px">';
      html += '<div style="font-weight:700;color:#c62828">❌ Cancelled</div>';
      html += '<div style="font-size:13px;color:#666;margin-top:4px">' + escHtml(c.cancelReason || "") + ' (by ' + escHtml(c.cancelledBy || "—") + ')</div>';
      if (c.refundStatus) {
        html += '<div style="font-size:13px;margin-top:6px">Refund: <span class="pill ' + (c.refundStatus === "pending" ? "pending" : "approved") + '">' + escHtml(c.refundStatus) + '</span> ₹' + (c.refundAmount || 0) + '</div>';
      }
      html += '</div>';
    }

    html += '<h4 style="font-size:13px;color:#666;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">Timeline</h4>';
    html += '<div class="timeline">';
    const events = tl.events || [];
    if (!events.length) html += '<div style="color:#999;font-size:13px">No events yet.</div>';
    else {
      html += events.map(function(e){
        let cls = "tl-event";
        const stage = e.meta && e.meta.stage;
        if (/escalation|nudge|alert|reassign/i.test(e.label) || stage === "nudge" || stage === "final_alert" || stage === "reassign_failed") cls += " escalation";
        if (/cancel/i.test(e.label) || stage === "auto_cancel") cls += " cancel";
        if (/resolve/i.test(e.label) || stage === "resolved") cls += " resolve";
        return (
          '<div class="' + cls + '">' +
            '<div class="tl-time">' + fmtAbs(e.at) + '</div>' +
            '<div class="tl-label">' + escHtml(e.label) + '</div>' +
            (e.meta && Object.keys(e.meta).length ? '<div class="tl-meta">' + escHtml(JSON.stringify(e.meta)) + '</div>' : '') +
          '</div>'
        );
      }).join("");
    }
    html += '</div>';

    if (tl.durations && Object.keys(tl.durations).length) {
      html += '<h4 style="font-size:13px;color:#666;letter-spacing:1px;margin:18px 0 8px;text-transform:uppercase">Durations</h4>';
      html += '<div style="font-size:13px;color:#666">';
      Object.entries(tl.durations).forEach(function([k,v]){
        if (v != null) html += '<div>• ' + escHtml(k) + ': ' + v + ' min</div>';
      });
      html += '</div>';
    }

    let footer = "";
    if (tl.status !== "delivered" && tl.status !== "cancelled") {
      footer =
        '<div class="actions">' +
          '<button class="btn btn-warn" onclick="forceReassignOrder(\'' + orderId + '\', this)">🔄 Force Reassign</button>' +
          '<button class="btn btn-reject" onclick="forceCancelOrder(\'' + orderId + '\', this)">❌ Force Cancel</button>' +
        '</div>';
    }

    openModal("Order #" + (tl.orderNumber || ""), html, footer);
  } catch (e) {
    $("modalBody").innerHTML = '<div class="err">' + escHtml(e.message) + '</div>';
  }
}

async function approveVendor(id, btn) {
  if (!confirm("Approve this vendor? They will be visible to customers.")) return;
  btn.disabled = true; btn.textContent = "Approving...";
  try {
    const r = await api("/api/admin/vendors/" + id + "/approve", { method: "PUT" });
    if (r.success) { toast("✅ Vendor approved!", "ok"); await loadVendors(); renderTab(); }
    else throw new Error(r.message || "Failed");
  } catch (e) { toast(e.message || "Error", "err"); btn.disabled = false; btn.textContent = "✓ Approve"; }
}
async function rejectVendor(id, btn) {
  const reason = prompt("Reason for rejection (optional):") || "Not approved";
  btn.disabled = true; btn.textContent = "...";
  try {
    const r = await api("/api/admin/vendors/" + id + "/approve", {
      method: "PUT", body: { isApproved: false, rejectedReason: reason }
    });
    toast(r.success ? "Vendor rejected" : (r.message || "Error"), r.success ? "ok" : "err");
    await loadVendors(); renderTab();
  } catch (e) { toast(e.message || "Error", "err"); btn.disabled = false; btn.textContent = "✕ Reject"; }
}

  if (!confirm("Revoke this vendor? They will no longer be visible to customers.")) return;

async function forceReassignOrder(orderId, btn) {
  if (!confirm("Force reassign this order to another rider?")) return;
  if (btn) { btn.disabled = true; btn.textContent = "..."; }
  try {
    const r = await api("/api/admin/orders/" + orderId + "/force-reassign", { method: "POST" });
    if (r.success) {
      toast("✅ Reassigned to " + (r.replacement && r.replacement.name || "another rider"), "ok");
      closeModal();
      await refreshAlerts();
    } else { toast(r.message || "No replacement available", "err"); }
  } catch (e) { toast(e.message || "Error", "err"); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "🔄 Force Reassign"; } }
}

async function forceCancelOrder(orderId, btn) {
  const reason = prompt("Reason for cancellation:");
  if (!reason) return;
  if (btn) { btn.disabled = true; btn.textContent = "..."; }
  try {
    const r = await api("/api/admin/orders/" + orderId + "/force-cancel", {
      method: "POST", body: { reason: reason }
    });
    if (r.success) {
      let msg = "✅ Order cancelled";
      if (r.summary && r.summary.refundMarked) msg += " · Refund ₹" + r.summary.refundAmount + " marked pending";
      if (r.summary && r.summary.walletReturned > 0) msg += " · ₹" + r.summary.walletReturned + " returned to wallet";
      toast(msg, "ok");
      closeModal();
      await refreshAlerts();
      if (cache.orders.length) await loadOrders();
      renderTab();
    } else { toast(r.message || "Failed to cancel", "err"); }
  } catch (e) { toast(e.message || "Error", "err"); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "❌ Cancel"; } }
}

async function acknowledgeAlert(orderId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = "..."; }
  try {
    const r = await api("/api/admin/orders/" + orderId + "/acknowledge-alert", { method: "POST" });
    toast(r.success ? "✅ Alert acknowledged" : (r.message || "Error"), r.success ? "ok" : "err");
    await refreshAlerts();
  } catch (e) { toast(e.message || "Error", "err"); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "✓ Acknowledge"; } }
}

async function resetVendorPwd(phone, btn)   { return _resetPwd(phone, "vendor", btn);   }
async function resetRiderPwd(phone, btn)    { return _resetPwd(phone, "delivery", btn); }
async function _resetPwd(phone, role, btn) {
  if (!phone) { toast("No phone on file", "err"); return; }
  if (!confirm("Generate a temporary password for " + phone + "?")) return;
  btn.disabled = true; btn.textContent = "...";
  try {
    const r = await api("/api/auth/forgot-password", { method: "POST", body: { phone: phone, role: role } });
    if (r.success) {
      alert("Temporary password for " + phone + ":\n\n" + r.tempPass + "\n\nShare this with the user. They should login and change it immediately.");
      toast("✅ Temp password generated", "ok");
    } else { toast(r.message || "Failed", "err"); }
  } catch (e) { toast(e.message || "Error", "err"); }
  finally { btn.disabled = false; btn.textContent = "🔒 Reset Password"; }
}

// ═══════════════════════════════ INIT ═══════════════════════════════
window.addEventListener("DOMContentLoaded", function () {
  if (token) showDashboard();
  else showLogin();
});

document.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && $("loginScreen").style.display !== "none") doLogin();
  if (e.key === "Escape") closeModal();
});
